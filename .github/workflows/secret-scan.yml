name: Secret scan

# Complements GitHub's native secret scanning + push protection (enable both in
# repo Settings → Code security). gitleaks catches committed secrets in CI/history.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans past commits
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
