name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Type-check, lint, unit, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: jectarone
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U portal -d jectarone"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql://portal:portal@localhost:5432/jectarone?schema=public
      AUTH_SECRET: ci-secret-not-used-for-anything-real-000000
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build # runs prisma migrate deploy against the postgres service, then next build

  e2e:
    name: Playwright end-to-end
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: jectarone
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U portal -d jectarone"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      E2E_DATABASE_URL: postgresql://portal:portal@localhost:5432/jectarone?schema=public
      DATABASE_URL: postgresql://portal:portal@localhost:5432/jectarone?schema=public
      AUTH_SECRET: ci-secret-not-used-for-anything-real-000000
      S3_BUCKET: jectarone-evidence
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://localhost:9000
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Start MinIO + create bucket
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do curl -sf http://localhost:9000/minio/health/ready && break; sleep 2; done
          docker run --rm --network host --entrypoint sh minio/mc:latest -c "
            mc alias set local http://localhost:9000 minioadmin minioadmin &&
            mc mb --ignore-existing local/jectarone-evidence"
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium
      - name: Run E2E (global setup migrates + seeds)
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
