# Local dev / E2E infra — mirrors production: PostgreSQL 16 + S3 (MinIO emulates
# the production Cloudflare R2 / S3 bucket).
# Usage:
#   docker compose up -d
#   cp .env.example .env   # set DATABASE_URL + AUTH_SECRET + the S3_* block below
#   npm run db:migrate && npm run db:seed
#
# DATABASE_URL="postgresql://portal:portal@localhost:5433/jectarone?schema=public"
# S3_BUCKET="jectarone-evidence"
# S3_REGION="us-east-1"
# S3_ACCESS_KEY_ID="minioadmin"
# S3_SECRET_ACCESS_KEY="minioadmin"
# S3_ENDPOINT="http://localhost:9000"
services:
  db:
    image: postgres:16-alpine
    container_name: jo-portal-pg
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: jectarone
    ports:
      - "5433:5432"
    volumes:
      - jo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d jectarone"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage (emulates production R2/S3).
  minio:
    image: minio/minio:latest
    container_name: jo-portal-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - jo_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: create the evidence bucket + open CORS for browser presigned PUTs.
  minio-init:
    image: minio/mc:latest
    container_name: jo-portal-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/jectarone-evidence &&
      mc anonymous set none local/jectarone-evidence &&
      echo 'bucket ready (private)';
      "

volumes:
  jo_pg_data:
  jo_minio_data:
